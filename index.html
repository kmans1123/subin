<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover"
    />
    <meta name="theme-color" content="#f7cfe0" />
    <meta name="description" content="여러 작은 놀이터로 이어지는 메인 화면" />
    <title>놀이터</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./carrot.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --ink: #5b4a63;
        --ink-soft: #806f87;
        --white: rgba(255, 255, 255, 0.9);
        --pink: #f58db5;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        padding: max(28px, env(safe-area-inset-top)) 20px
          max(28px, env(safe-area-inset-bottom));
        color: var(--ink);
        text-align: center;
        font-family: "Jua", sans-serif;
        background: linear-gradient(
          -45deg,
          #ffd5e5,
          #e5d8ff,
          #ccecff,
          #d7f5df,
          #fff0bf,
          #ffd8e8
        );
        background-size: 400% 400%;
        animation: gradientMove 16s ease infinite;
        overflow-x: hidden;
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        width: 280px;
        height: 280px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.25);
        filter: blur(6px);
        pointer-events: none;
      }

      body::before {
        top: -100px;
        left: -90px;
      }

      body::after {
        right: -100px;
        bottom: -110px;
      }

      @keyframes gradientMove {
        0%,
        100% {
          background-position: 0% 50%;
        }
        50% {
          background-position: 100% 50%;
        }
      }

      .main {
        position: relative;
        z-index: 1;
        width: min(100%, 760px);
        margin: 0 auto;
      }

      [hidden] {
        display: none !important;
      }

      .password-gate {
        position: relative;
        z-index: 2;
        display: flex;
        min-height: calc(100vh - 56px);
        align-items: center;
        justify-content: center;
      }

      .password-card {
        width: min(100%, 360px);
        padding: 32px 26px 28px;
        border: 3px solid rgba(255, 255, 255, 0.85);
        border-radius: 32px;
        background: var(--white);
        box-shadow: 0 20px 45px rgba(113, 82, 118, 0.2);
        backdrop-filter: blur(12px);
      }

      .password-card.is-wrong {
        animation: passwordShake 0.38s ease;
      }

      .password-icon {
        margin-bottom: 12px;
        font-size: 48px;
      }

      .password-title {
        margin: 0 0 8px;
        font-family: "Gaegu", cursive;
        font-size: 34px;
        line-height: 1.2;
      }

      .password-description {
        margin: 0 0 20px;
        color: var(--ink-soft);
        font-size: 15px;
      }

      .password-input {
        width: 100%;
        height: 58px;
        padding: 0 18px;
        color: var(--ink);
        border: 2px solid #eadcf0;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.96);
        font-family: inherit;
        font-size: 28px;
        letter-spacing: 12px;
        text-align: center;
        outline: none;
      }

      .password-input:focus {
        border-color: #f39abb;
        box-shadow: 0 0 0 4px rgba(243, 154, 187, 0.18);
      }

      .password-error {
        min-height: 21px;
        margin: 8px 0 10px;
        color: #dd5f8f;
        font-size: 14px;
      }

      .keypad {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
      }

      .keypad button {
        min-height: 48px;
        color: var(--ink);
        border: 0;
        border-radius: 16px;
        background: linear-gradient(145deg, #f7efff, #ffe8f1);
        font-family: inherit;
        font-size: 20px;
        cursor: pointer;
        box-shadow: 0 4px 10px rgba(113, 82, 118, 0.1);
        transition: transform 0.12s ease, filter 0.12s ease;
        -webkit-tap-highlight-color: transparent;
      }

      .keypad button:active {
        transform: scale(0.92);
      }

      .keypad .keypad-submit {
        color: #fff;
        background: linear-gradient(135deg, #f58db5, #e772a1);
      }

      @keyframes passwordShake {
        0%,
        100% {
          transform: translateX(0);
        }
        25% {
          transform: translateX(-8px);
        }
        75% {
          transform: translateX(8px);
        }
      }

      .eyebrow {
        margin: 12px 0 6px;
        color: var(--ink-soft);
        font-family: "Gaegu", cursive;
        font-size: clamp(20px, 5vw, 26px);
        font-weight: 700;
      }

      h1 {
        margin: 0;
        font-family: "Gaegu", cursive;
        font-size: clamp(46px, 12vw, 72px);
        line-height: 1;
        text-shadow: 0 3px 0 rgba(255, 255, 255, 0.65);
      }

      .heart {
        color: var(--pink);
      }

      .description {
        margin: 16px auto 34px;
        color: var(--ink-soft);
        font-size: clamp(16px, 4vw, 19px);
        line-height: 1.6;
      }

      .menu {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
        gap: 18px;
      }

      .menu-card {
        position: relative;
        display: flex;
        min-height: 180px;
        padding: 24px 20px;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--ink);
        text-decoration: none;
        border: 3px solid rgba(255, 255, 255, 0.82);
        border-radius: 30px;
        background: linear-gradient(145deg, #fff4c9, #ffd7e8);
        box-shadow: 0 14px 30px rgba(113, 82, 118, 0.17);
        transition: transform 0.25s ease, box-shadow 0.25s ease;
        -webkit-tap-highlight-color: transparent;
      }

      .menu-card:hover,
      .menu-card:focus-visible {
        transform: translateY(-7px) scale(1.02);
        box-shadow: 0 20px 38px rgba(113, 82, 118, 0.23);
        outline: none;
      }

      .menu-card:active {
        transform: scale(0.97);
      }

      .menu-card__icon {
        margin-bottom: 10px;
        font-size: 52px;
        line-height: 1;
      }

      .menu-card__title {
        font-size: 25px;
      }

      .menu-card__desc {
        margin-top: 7px;
        color: var(--ink-soft);
        font-family: "Gaegu", cursive;
        font-size: 18px;
        font-weight: 700;
      }

      .guide {
        margin-top: 28px;
        color: rgba(91, 74, 99, 0.68);
        font-family: "Gaegu", cursive;
        font-size: 17px;
      }

      .lock-again {
        margin: -16px 0 24px;
        padding: 10px 16px;
        color: var(--ink-soft);
        border: 1px solid rgba(128, 111, 135, 0.25);
        border-radius: 99px;
        background: rgba(255, 255, 255, 0.48);
        font-family: inherit;
        font-size: 13px;
        cursor: pointer;
        transition: background 0.2s ease, transform 0.15s ease;
        -webkit-tap-highlight-color: transparent;
      }

      .lock-again:hover,
      .lock-again:focus-visible {
        color: var(--ink);
        background: rgba(255, 255, 255, 0.78);
        outline: none;
      }

      .lock-again:active {
        transform: scale(0.95);
      }

      @media (max-width: 460px) {
        .menu {
          grid-template-columns: 1fr;
        }

        .menu-card {
          min-height: 155px;
        }
      }

      @media (prefers-reduced-motion: reduce) {
        body {
          animation: none;
        }

        .menu-card {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <section class="password-gate" id="passwordGate" aria-labelledby="passwordTitle">
      <form class="password-card" id="passwordForm">
        <div class="password-icon" aria-hidden="true">🔐</div>
        <h1 class="password-title" id="passwordTitle">비밀번호를 입력해주세요</h1>
        <p class="password-description">4자리 숫자를 입력해 주세요.</p>
        <input
          class="password-input"
          id="passwordInput"
          type="password"
          inputmode="numeric"
          pattern="[0-9]*"
          maxlength="4"
          autocomplete="off"
          readonly
          aria-label="4자리 비밀번호"
        />
        <p class="password-error" id="passwordError" role="status" aria-live="polite"></p>
        <div class="keypad" aria-label="숫자 키패드">
          <button type="button" data-number="1">1</button>
          <button type="button" data-number="2">2</button>
          <button type="button" data-number="3">3</button>
          <button type="button" data-number="4">4</button>
          <button type="button" data-number="5">5</button>
          <button type="button" data-number="6">6</button>
          <button type="button" data-number="7">7</button>
          <button type="button" data-number="8">8</button>
          <button type="button" data-number="9">9</button>
          <button type="button" id="passwordDelete" aria-label="한 글자 지우기">⌫</button>
          <button type="button" data-number="0">0</button>
          <button class="keypad-submit" type="submit" aria-label="비밀번호 확인">✓</button>
        </div>
      </form>
    </section>

    <main class="main" id="mainContent" hidden>
      <p class="eyebrow">수빈이의 공간 🎪</p>
      <h1>놀이터 <span class="heart">♡</span></h1>
      <p class="description">
        원하는 놀이터를 골라 들어가세요.<br />앞으로 새로운 공간이 하나씩 늘어날 거예요.
      </p>

      <button class="lock-again" id="lockAgain" type="button">
        🔒 비밀번호 다시 입력하기
      </button>

      <nav class="menu" aria-label="놀이터 목록">
        <!-- 새 페이지를 추가할 때 이 a 블록을 복사하고 href와 문구만 바꾸면 됩니다. -->
        <a class="menu-card" href="./number-song/number-song.html">
          <span class="menu-card__icon" aria-hidden="true">🔢</span>
          <span class="menu-card__title">숫자송</span>
          <span class="menu-card__desc">숫자 친구들과 노래하고 놀기 ♡</span>
        </a>
      </nav>

      <p class="guide">카드를 누르면 새로운 놀이터가 열려요 ✨</p>
    </main>
    <script>
      (() => {
        const PASSWORD = "0714";
        const SESSION_KEY = "playgroundUnlocked";
        const WINDOW_MARKER = "playgroundUnlocked";
        const gate = document.getElementById("passwordGate");
        const main = document.getElementById("mainContent");
        const form = document.getElementById("passwordForm");
        const input = document.getElementById("passwordInput");
        const error = document.getElementById("passwordError");
        const deleteButton = document.getElementById("passwordDelete");
        const lockAgainButton = document.getElementById("lockAgain");

        function isPageReload() {
          const navigationEntry = performance.getEntriesByType?.("navigation")[0];
          if (navigationEntry) return navigationEntry.type === "reload";
          // 구형 iOS Safari 대응
          return performance.navigation?.type === 1;
        }

        function clearAccess() {
          try {
            sessionStorage.removeItem(SESSION_KEY);
          } catch (_) {}
          if (window.name === WINDOW_MARKER) window.name = "";
        }

        function hasAccess() {
          try {
            if (sessionStorage.getItem(SESSION_KEY) === "true") return true;
          } catch (_) {}
          return window.name === WINDOW_MARKER;
        }

        function saveAccess() {
          try {
            sessionStorage.setItem(SESSION_KEY, "true");
          } catch (_) {}
          window.name = WINDOW_MARKER;
        }

        function getNextPage() {
          const next = new URLSearchParams(window.location.search).get("next");
          if (!next || next.includes("..") || next.includes(":") || next.startsWith("/")) {
            return null;
          }
          return `./${next}`;
        }

        function enterPlayground() {
          const nextPage = getNextPage();
          if (nextPage) {
            window.location.replace(nextPage);
            return;
          }
          gate.hidden = true;
          main.hidden = false;
        }

        function showWrongPassword() {
          error.textContent = "비밀번호가 맞지 않아요. 다시 입력해 주세요.";
          input.value = "";
          form.classList.remove("is-wrong");
          void form.offsetWidth;
          form.classList.add("is-wrong");
        }

        input.addEventListener("input", () => {
          input.value = input.value.replace(/\D/g, "").slice(0, 4);
          error.textContent = "";
        });

        document.querySelectorAll("[data-number]").forEach((button) => {
          button.addEventListener("click", () => {
            if (input.value.length >= 4) return;
            input.value += button.dataset.number;
            error.textContent = "";
          });
        });

        deleteButton.addEventListener("click", () => {
          input.value = input.value.slice(0, -1);
          error.textContent = "";
        });

        lockAgainButton.addEventListener("click", () => {
          clearAccess();
          input.value = "";
          error.textContent = "";
          main.hidden = true;
          gate.hidden = false;
        });

        form.addEventListener("submit", (event) => {
          event.preventDefault();
          if (input.value !== PASSWORD) {
            showWrongPassword();
            return;
          }
          saveAccess();
          enterPlayground();
        });

        // 메인 화면을 직접 새로고침한 경우에만 다시 비밀번호를 요청합니다.
        // 숫자송의 "메인" 버튼으로 이동한 경우는 navigate이므로 인증이 유지됩니다.
        if (isPageReload()) clearAccess();

        if (hasAccess()) {
          enterPlayground();
        }
      })();
    </script>
  </body>
</html>
