<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#ffd7e8" />
    <meta
      name="description"
      content="음악을 들으며 1부터 10까지 귀여운 숫자 친구들을 눌러보는 우리만의 숫자송 놀이터 ♡"
    />
    <title>숫자송</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../carrot.png?v=2" />
    <script>
      (() => {
        let unlocked = false;
        try {
          unlocked = sessionStorage.getItem("playgroundUnlocked") === "true";
        } catch (_) {}
        unlocked = unlocked || window.name === "playgroundUnlocked";
        if (!unlocked) {
          window.location.replace("../index.html?next=" + encodeURIComponent("number-song/number-song.html"));
        }
      })();
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="number-song.css" />
  </head>
  <body>

    <div class="bg" aria-hidden="true">
      <div class="bg-gradient"></div>
      <div class="bg-orb bg-orb--1" id="bgOrb1"></div>
      <div class="bg-orb bg-orb--2" id="bgOrb2"></div>
      <div class="bg-orb bg-orb--3" id="bgOrb3"></div>
      <div class="bg-decor" id="bgDecor"></div>
    </div>

    <section class="intro" id="intro" aria-label="숫자송 시작 화면">
      <div class="card">
        <div class="card-shine" aria-hidden="true"></div>
        <p class="card-eyebrow">작은 놀이터 🎪</p>
        <h1 class="card-title">숫자송 <span class="number-inline">🔢</span></h1>
        <p class="card-desc">음악을 들으며 숫자 친구들을 눌러보세요</p>

        <button class="play-btn" id="playBtn" aria-label="숫자 친구들 만나기" disabled>
          <span class="play-btn__ring" aria-hidden="true"></span>
          <span class="play-btn__icon" aria-hidden="true">▶</span>
          <span class="play-btn__label">숫자 친구들 만나기</span>
        </button>

        <p class="card-foot" id="introFoot">볼륨을 미리 조절 후 봐주세요 🎧</p>
        <p class="audio-note" id="audioNote" role="status" aria-live="polite"></p>
        <a class="main-link" href="../index.html">← 메인 놀이터로</a>
      </div>
    </section>

    <main class="playground" id="playground" aria-hidden="true">

      <div class="topbar" id="topbar">
        <div class="progress" id="progressTrack">
          <div class="progress__fill" id="progressFill"></div>
        </div>
      </div>

      <div class="banner" id="banner" aria-live="polite">
        <span class="banner__text" id="bannerText">숫자 친구들을 눌러보세요!</span>
      </div>

      <div class="grid" id="grid" role="group" aria-label="숫자 친구들"></div>

      <div class="grid-spacer" aria-hidden="true"></div>
    </main>

    <div class="controls" id="controls" aria-hidden="true">
      <button class="ctrl" id="ctrlPlay" aria-label="재생 또는 일시정지">
        <span class="ctrl__icon" id="ctrlPlayIcon">❚❚</span>
        <span class="ctrl__label">재생</span>
      </button>
      <button class="ctrl" id="ctrlRestart" aria-label="음악 처음부터 다시 재생">
        <span class="ctrl__icon">⟲</span>
        <span class="ctrl__label">처음부터</span>
      </button>
      <button class="ctrl" id="ctrlVolume" aria-label="볼륨 조절" aria-expanded="false">
        <span class="ctrl__icon" id="ctrlVolumeIcon">🔊</span>
        <span class="ctrl__label">볼륨</span>
      </button>
      <div class="volume-panel" id="volumePanel" aria-hidden="true">
        <div class="volume-panel__header">
          <button class="volume-mute" id="volumeMute" type="button" aria-label="음소거" aria-pressed="false">🔇 음소거</button>
          <div class="volume-panel__info">
            <span>볼륨</span>
            <output id="volumeValue" for="volumeSlider">50%</output>
          </div>
        </div>
        <input
          class="volume-slider"
          id="volumeSlider"
          type="range"
          min="0"
          max="1"
          step="0.05"
          value="0.5"
          aria-label="음악 볼륨"
        />
      </div>
      <button class="ctrl ctrl--accent" id="ctrlDance" aria-label="숫자 친구들 다 같이 춤추기">
        <span class="ctrl__icon">✨</span>
        <span class="ctrl__label">단체 춤</span>
      </button>
      <button class="ctrl" id="ctrlHome" aria-label="메인 화면으로 돌아가기">
        <span class="ctrl__icon">⌂</span>
        <span class="ctrl__label">메인</span>
      </button>
    </div>

    <button class="heart-egg" id="heartEgg" aria-label="비밀 메시지 보기" aria-hidden="true">
      <span aria-hidden="true">🥕</span>
    </button>
    <button class="heart-egg heart-egg--rain" id="carrotEgg" aria-label="당근 비 내리기" aria-hidden="true">
      <span aria-hidden="true">🥕</span>
    </button>

    <div class="secret" id="secret" aria-hidden="true">
      <div class="secret__card" role="dialog" aria-modal="true" aria-labelledby="secretText">
        <button class="secret__close" id="secretClose" aria-label="닫기">✕</button>
        <div class="secret__heart" aria-hidden="true">♡</div>
        <p class="secret__text" id="secretText"></p>
        <button class="pill-btn pill-btn--love" id="secretOk">나도 좋아해 ♡</button>
        <p class="secret__saved" id="secretSaved" role="status" aria-live="polite"></p>
      </div>
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <audio id="audio" preload="auto" playsinline></audio>

    <script src="number-song.js" defer></script>
  </body>
</html>
