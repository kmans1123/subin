<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#bfeafa" />
    <meta name="description" content="토끼에게 당근을 먹이며 즐기는 당근송 게임" />
    <title>당근송</title>
    <link rel="icon" type="image/png" sizes="32x32" href="../carrot.png?v=2" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Jua&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="./carrot-song.css" />
  </head>
  <body>
    <audio id="carrotAudio" preload="auto" src="./carrot-song.mp3"></audio>

    <section class="intro" id="intro" aria-labelledby="introTitle">
      <div class="intro__cloud intro__cloud--one"></div>
      <div class="intro__cloud intro__cloud--two"></div>
      <div class="intro-card">
        <p class="intro-card__eyebrow">작은 놀이터 🎪</p>
        <h1 id="introTitle">당근송 🥕</h1>
        <div class="bunny bunny--intro" aria-hidden="true">
          <div class="bunny__ear bunny__ear--left"><i></i></div>
          <div class="bunny__ear bunny__ear--right"><i></i></div>
          <div class="bunny__head">
            <span class="bunny__eye bunny__eye--left"></span><span class="bunny__eye bunny__eye--right"></span>
            <span class="bunny__cheek bunny__cheek--left"></span><span class="bunny__cheek bunny__cheek--right"></span>
            <span class="bunny__nose"></span><span class="bunny__mouth"></span>
          </div>
          <div class="bunny__body"><span class="bunny__foot bunny__foot--left"></span><span class="bunny__foot bunny__foot--right"></span></div>
        </div>
        <p>떨어지는 당근을 눌러 토끼에게 먹여주세요!</p>
        <button class="start-button" id="startButton" type="button" aria-label="당근송 게임 시작">🥕 당근송 시작!</button>
        <p class="intro-card__volume">볼륨을 미리 조절 후 봐주세요 🎧</p>
        <p class="audio-status" id="audioStatus" role="status" aria-live="polite"></p>
        <a class="main-link" href="../index.html">← 메인 놀이터로</a>
      </div>
    </section>

    <main class="game" id="game" aria-hidden="true">
      <div class="audio-progress" aria-label="노래 재생 진행률">
        <div class="audio-progress__track"><div class="audio-progress__fill" id="progressFill"></div></div>
        <span id="remainingTime">남은 시간 --:--</span>
      </div>
      <header class="hud" aria-label="게임 상태">
        <div class="hud-item"><span>당근</span><strong id="score">0</strong></div>
        <div class="hud-item"><span>콤보</span><strong id="combo">0</strong></div>
        <div class="hud-item hud-item--stage"><span>토끼 단계</span><strong id="stageName">아기 토끼</strong></div>
      </header>

      <section class="world" id="world" aria-label="당근 게임 화면">
        <div class="sun" aria-hidden="true"></div>
        <div class="moon" aria-hidden="true"></div>
        <div class="stars" aria-hidden="true"></div>
        <div class="fireflies" id="fireflies" aria-hidden="true"></div>
        <div class="cloud cloud--one" aria-hidden="true"></div>
        <div class="cloud cloud--two" aria-hidden="true"></div>
        <div class="rainbow" id="rainbow" aria-hidden="true"></div>
        <p class="game-message" id="gameMessage" role="status" aria-live="polite">당근을 눌러 먹여주세요! 🥕</p>
        <div class="combo-pop" id="comboPop" aria-hidden="true"></div>
        <div class="carrot-layer" id="carrotLayer"></div>

        <div class="bunny-wrap stage-baby" id="bunnyWrap">
          <div class="speech" id="speech" role="status" aria-live="polite"></div>
          <div class="accessory accessory--ribbon" aria-hidden="true">🎀</div>
          <div class="accessory accessory--hat" aria-hidden="true">👒</div>
          <div class="accessory accessory--glasses" aria-hidden="true">😎</div>
          <div class="accessory accessory--cape" aria-hidden="true"></div>
          <div class="accessory accessory--crown" aria-hidden="true">👑</div>
          <div class="bunny" id="bunny" role="button" tabindex="0" aria-label="흰 토끼 쓰다듬기">
            <div class="bunny__ear bunny__ear--left"><i></i></div>
            <div class="bunny__ear bunny__ear--right"><i></i></div>
            <div class="bunny__head">
              <span class="bunny__eye bunny__eye--left"></span><span class="bunny__eye bunny__eye--right"></span>
              <span class="bunny__cheek bunny__cheek--left"></span><span class="bunny__cheek bunny__cheek--right"></span>
              <span class="bunny__nose"></span><span class="bunny__mouth"></span>
            </div>
            <div class="bunny__body"><span class="bunny__tail"></span><span class="bunny__paw bunny__paw--left"></span><span class="bunny__paw bunny__paw--right"></span><span class="bunny__foot bunny__foot--left"></span><span class="bunny__foot bunny__foot--right"></span></div>
            <span class="bunny__tongue" aria-hidden="true"></span>
            <span class="bunny__tummy" aria-hidden="true">〰</span>
            <span class="bunny__sick-stars" aria-hidden="true">⭐ 💫</span>
            <span class="bunny__flies" aria-hidden="true">· ʚ ·</span>
          </div>
        </div>
        <div class="grass" aria-hidden="true"></div>
      </section>

      <section class="song-ended" id="songEnded" aria-label="노래 종료 안내" hidden>
        <button class="song-ended__toggle" id="songEndedToggle" type="button" aria-expanded="true">− 접기</button>
        <p>노래는 끝났지만 토끼는 아직 배고파요 🥕</p>
        <div class="song-ended__actions">
          <button id="listenAgain" type="button">▶ 음악 다시 듣기</button>
          <button id="resetEnded" type="button">↻ 처음부터</button>
          <button id="rainEnded" type="button">🥕 당근 비 내리기</button>
        </div>
      </section>

      <nav class="controls" aria-label="게임 조작">
        <button id="playControl" type="button" aria-label="음악 재생"><span id="playIcon">▶</span><small>재생</small></button>
        <button id="pauseControl" type="button" aria-label="음악 일시정지"><span>❚❚</span><small>일시정지</small></button>
        <button id="volumeControl" type="button" aria-label="볼륨 조절" aria-expanded="false"><span id="volumeIcon">🔊</span><small>볼륨</small></button>
        <div class="volume-panel" id="volumePanel" aria-hidden="true">
          <div class="volume-panel__header">
            <button class="volume-mute" id="volumeMute" type="button" aria-label="음소거" aria-pressed="false">🔇 음소거</button>
            <div class="volume-panel__info"><span>볼륨</span><output id="volumeValue" for="volumeSlider">50%</output></div>
          </div>
          <input class="volume-slider" id="volumeSlider" type="range" min="0" max="1" step="0.05" value="0.5" aria-label="음악 볼륨" />
        </div>
        <button id="restartControl" type="button" aria-label="게임 처음부터"><span>↻</span><small>처음부터</small></button>
        <a href="../index.html" aria-label="메인 화면으로"><span>⌂</span><small>메인</small></a>
      </nav>

      <button class="rain-button" id="rainButton" type="button" aria-label="10초 동안 당근 비 내리기">🥕 당근 비</button>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>
    <script src="./carrot-song.js" defer></script>
  </body>
</html>
